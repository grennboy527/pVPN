# pVPN drop-in for systemd-time-wait-sync.service
#
# When pVPN's pre-boot kill switch is active (i.e. the user had the kill
# switch enabled on the last connect and rebooted), outbound NTP to the
# wider internet is blocked by design — leaking NTP queries before the
# VPN tunnel is up defeats the whole point of the kill switch.
#
# systemd-time-wait-sync.service blocks on /run/systemd/timesync/synchronized
# until systemd-timesyncd successfully syncs time from an NTP pool server.
# With the preboot kill switch blocking UDP 123, that sync never happens,
# and this service hangs for its full TimeoutStartSec (default 120 seconds).
# Because time-sync.target orders before multi-user.target on some distros
# (notably the Arch cloud image), the hang delays boot by ~2 minutes and
# keeps SSH / login managers from starting until the timeout fires.
#
# Cap the timeout at 15 seconds so, in the worst case, the boot delay is
# bounded. Once pvpnd is up and the user reconnects, in-tunnel NTP works
# again and time-sync.target fires normally on subsequent boots.
#
# This drop-in is installed by pVPN's install.sh and removed by
# uninstall.sh. It only affects systemd-time-wait-sync.service's startup
# timeout — nothing else about the service is changed.

[Service]
TimeoutStartSec=15s
