name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Race tests
        run: go test -race ./...

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: golangci-lint
        # v8 of the action defaults to installing golangci-lint v2.x, which
        # is what our .golangci.yml targets (and what's built against a
        # recent-enough Go to handle our go.mod toolchain pin). v6 of the
        # action pulled the latest v1.x, which is built with Go 1.24 and
        # refuses to run against our go 1.26 module. Pin an explicit linter
        # version too so "latest" can't silently break CI the same way.
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
