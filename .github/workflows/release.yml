name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build static binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o pvpnd  ./cmd/pvpnd
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o pvpn   ./cmd/pvpn
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o pvpnctl ./cmd/pvpnctl

      - name: Generate checksums
        run: sha256sum pvpn pvpnd pvpnctl > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pvpn
            pvpnd
            pvpnctl
            SHA256SUMS

  aur-publish:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'SSHEOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          SSHEOF

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/pvpn-go.git aur

      - name: Sync PKGBUILD + install hook from repo and push
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          # Repo is the source of truth — copy both files into the AUR clone.
          cp dist/PKGBUILD          aur/PKGBUILD
          cp dist/pvpn-go.install   aur/pvpn-go.install

          cd aur

          # Pin to the tag being released, reset pkgrel.
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Regenerate .SRCINFO from scratch. We avoid `makepkg --printsrcinfo`
          # (which would require installing base-devel in CI) by hand-writing
          # the file — the schema is stable and matches what makepkg emits.
          cat > .SRCINFO <<SRCINFO
          pkgbase = pvpn-go
          	pkgdesc = Proton VPN client with TUI for Linux (WireGuard + Stealth)
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/YourDoritos/pVPN
          	install = pvpn-go.install
          	arch = x86_64
          	license = GPL-3.0-or-later
          	makedepends = go>=1.22
          	makedepends = git
          	depends = glibc
          	source = pvpn-go-${VERSION}.tar.gz::https://github.com/YourDoritos/pVPN/archive/v${VERSION}.tar.gz
          	sha256sums = SKIP

          pkgname = pvpn-go
          SRCINFO

          git config user.email "paul.goessmann@proton.me"
          git config user.name "YourDoritos"
          git add PKGBUILD pvpn-go.install .SRCINFO
          git diff --cached --quiet && echo "No changes to publish" && exit 0
          git commit -m "Update to v${VERSION}"
          git push
