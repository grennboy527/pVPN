name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build static binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o pvpnd  ./cmd/pvpnd
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o pvpn   ./cmd/pvpn
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o pvpnctl ./cmd/pvpnctl

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pvpn
            pvpnd
            pvpnctl

  aur-publish:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Set up SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'SSHEOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          SSHEOF

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/pvpn-go.git aur

      - name: Update version and push
        run: |
          cd aur
          VERSION=${GITHUB_REF_NAME#v}
          OLD_VERSION=$(grep -oP '(?<=pkgver=).*' PKGBUILD)

          # Update PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Update .SRCINFO (same fields, different format)
          sed -i "s/pkgver = .*/pkgver = ${VERSION}/" .SRCINFO
          sed -i "s/pkgrel = .*/pkgrel = 1/" .SRCINFO
          sed -i "s/${OLD_VERSION}/${VERSION}/g" .SRCINFO

          git config user.email "paul.goessmann@proton.me"
          git config user.name "YourDoritos"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No version change" && exit 0
          git commit -m "Update to v${VERSION}"
          git push
