version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell

  settings:
    revive:
      rules:
        # Drop the bikeshedding "every exported symbol needs a doc
        # comment" rule — we document the core API surface explicitly
        # and don't want churn on every interface-satisfying method.
        # Everything else in the default revive set is enabled below.
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: var-declaration
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
          disabled: true
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: unused-parameter
          disabled: true

  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck]

formatters:
  enable:
    - gofmt
    - goimports
